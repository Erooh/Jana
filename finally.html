<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Լեռնիկ և Լիանա</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --gold-dark:#8B6914;--gold-mid:#C5922A;
    --gold-light:#E8C97A;--gold-pale:#F5E9C9;
    --off-white:#f5f3ef;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--off-white);font-family:'Cormorant Garamond',serif;overflow-x:hidden;}

  /* ── UNIFIED ANIMATIONS ── */
  .reveal{opacity:0;transform:translateY(30px);transition:opacity .9s,transform .9s;}
  .reveal.visible{opacity:1;transform:none;}
  .reveal-left{opacity:0;transform:translateY(30px);transition:opacity .9s,transform .9s;}
  .reveal-left.visible{opacity:1;transform:none;}
  .reveal-right{opacity:0;transform:translateY(30px);transition:opacity .9s,transform .9s;}
  .reveal-right.visible{opacity:1;transform:none;}
  .reveal-scale{opacity:0;transform:translateY(30px);transition:opacity 1s,transform 1s;}
  .reveal-scale.visible{opacity:1;transform:none;}
  .d1{transition-delay:.1s}.d2{transition-delay:.25s}
  .d3{transition-delay:.4s}.d4{transition-delay:.55s}

  /* HERO */
  .hero{position:relative;width:100%;height:100vh;overflow:hidden;}
  .hero>img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;animation:heroZoom 8s ease forwards;}
  @keyframes heroZoom{from{transform:scale(1.04)}to{transform:scale(1)}}
  .hero-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.08) 100%);pointer-events:none;}
  .hero-fade{position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(to top,rgba(245,243,239,.55),transparent);pointer-events:none;}
  .hero-names{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);width:min(500px,90vw);z-index:5;opacity:0;animation:namesIn 1.4s ease 1.1s forwards;pointer-events:none;}
  @keyframes namesIn{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  .scroll-arrow{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;z-index:10;text-decoration:none;opacity:0;animation:fIn 1s ease 2s forwards;}
  @keyframes fIn{to{opacity:1}}
  .arrow-track{width:1px;height:38px;background:linear-gradient(to bottom,transparent,rgba(197,146,42,.65));position:relative;overflow:hidden;}
  .arrow-track::after{content:'';position:absolute;top:-100%;left:0;width:1px;height:100%;background:var(--gold-light);animation:drip 2s ease-in-out infinite;}
  .arrow-chevron{display:flex;flex-direction:column;align-items:center;gap:4px;animation:bob 2s ease-in-out infinite;}
  .chevron{width:16px;height:9px;position:relative;}
  .chevron::before,.chevron::after{content:'';position:absolute;top:0;width:50%;height:1.5px;background:rgba(197,146,42,.7);}
  .chevron::before{left:0;transform:rotate(35deg);transform-origin:left center;}
  .chevron::after{right:0;transform:rotate(-35deg);transform-origin:right center;}
  .chevron-2{opacity:.3;}

  /* IMG2 */
  .img2-section{position:relative;width:100%;background:var(--off-white);}
  .img2-section img{display:block;width:100%;height:auto;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 8%,black 20%,black 78%,rgba(0,0,0,.5) 90%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 8%,black 20%,black 78%,rgba(0,0,0,.5) 90%,transparent 100%);}
  .img2-section::before{content:'';position:absolute;top:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,var(--off-white),transparent);z-index:2;pointer-events:none;}

  /* COUNTDOWN */
  .countdown-wrap{background:var(--off-white);padding:60px 20px 50px;text-align:center;position:relative;}
  .countdown-wrap::before{content:'';width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--gold-mid));position:absolute;top:0;left:50%;}
  .countdown-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold-mid);margin-bottom:36px;opacity:.75;}
  .countdown{display:flex;justify-content:center;align-items:flex-start;gap:6px;}
  .cd-unit{display:flex;flex-direction:column;align-items:center;min-width:72px;}
  .cd-num{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,9vw,72px);font-weight:300;color:var(--gold-dark);line-height:1;letter-spacing:-.02em;min-width:2ch;text-align:center;}
  .cd-sub{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold-mid);margin-top:8px;opacity:.7;}
  .cd-sep{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,7vw,60px);font-weight:300;color:var(--gold-mid);line-height:1;opacity:.4;margin-top:2px;align-self:flex-start;}

  /* CALENDAR */
  .calendar-section{position:relative;width:100%;background:var(--off-white);padding-bottom:20px;}
  .calendar-section::before{content:'';width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--gold-mid));position:absolute;top:0;left:50%;}
  .calendar-section img{display:block;width:100%;max-width:680px;margin:0 auto;height:auto;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 5%,black 12%,black 88%,rgba(0,0,0,.5) 95%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 5%,black 12%,black 88%,rgba(0,0,0,.5) 95%,transparent 100%);}

  /* DETAILS → now just a full-width image section */
  .details-img-section{
    background:var(--off-white);
    padding:0;
    position:relative;
  }
  .details-img-section::before{
    content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:1px;height:50px;
    background:linear-gradient(to bottom,var(--gold-mid),transparent);
  }
  .details-img-section::after{
    content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:1px;height:50px;
    background:linear-gradient(to top,var(--gold-mid),transparent);
  }
  .details-img-section img{
    display:block;width:100%;max-width:780px;margin:0 auto;height:auto;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 5%,black 14%,black 86%,rgba(0,0,0,.5) 95%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 5%,black 14%,black 86%,rgba(0,0,0,.5) 95%,transparent 100%);
  }

  /* GALLERY */
  .gallery-section{background:var(--off-white);padding:80px 0 60px;position:relative;}
  .gallery-section::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:50px;background:linear-gradient(to bottom,var(--gold-mid),transparent);}
  .gallery-head{text-align:center;margin-bottom:50px;padding-top:16px;}
  .gallery-head h2{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold-mid);margin-bottom:12px;}
  .gdiv{display:flex;align-items:center;gap:12px;justify-content:center;width:min(240px,70vw);margin:0 auto;}
  .gdiv-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold-mid));}
  .gdiv-line.r{background:linear-gradient(to left,transparent,var(--gold-mid));}
  .gdiv-dot{width:5px;height:5px;background:var(--gold-mid);transform:rotate(45deg);flex-shrink:0;}
  .gal-stagger{position:relative;width:min(88vw,400px);margin:0 auto;height:640px;}
  .gal-card{position:absolute;width:63%;background:#fff;box-shadow:0 8px 28px rgba(0,0,0,0.14),0 2px 6px rgba(0,0,0,0.07);border-radius:3px;overflow:hidden;}
  .gal-card-1{top:0;left:0;z-index:2;}
  .gal-card-2{bottom:60px;right:0;z-index:3;}
  .gal-card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;pointer-events:none;}
  @media(max-width:480px){.gal-stagger{width:86vw;height:560px;}}

  /* LOCATION HINT */
  .location-hint{background:var(--off-white);padding:40px 0 0;text-align:center;}
  .location-hint-img{display:block;width:min(340px,80vw);margin:0 auto;border-radius:4px;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 10%,black 90%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0%,black 10%,black 90%,transparent 100%);}

  /* BETWEEN PHOTO */
  .between-photo{position:relative;width:100%;background:var(--off-white);margin-top:-10px;}
  .between-photo img{display:block;width:100%;height:auto;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 6%,black 16%,black 84%,rgba(0,0,0,.5) 94%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 6%,black 16%,black 84%,rgba(0,0,0,.5) 94%,transparent 100%);}
  .photo-btn-wrap{display:flex;justify-content:center;padding:24px 0 40px;background:var(--off-white);}

  /* VENUE */
  .venue-section{background:var(--off-white);padding:30px 0 80px;position:relative;overflow:hidden;}
  .venue-inner{display:flex;flex-direction:column;align-items:center;gap:40px;text-align:center;}
  .venue-img{width:100%;height:auto;display:block;
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 5%,black 14%,black 86%,rgba(0,0,0,.5) 94%,transparent 100%);
    mask-image:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.5) 5%,black 14%,black 86%,rgba(0,0,0,.5) 94%,transparent 100%);}
  .venue-text{display:flex;flex-direction:column;align-items:center;gap:0;text-align:center;padding:0 40px;}

  /* ── VENUE BUTTON ── */
  .venue-btn{
    display:inline-flex;align-items:center;padding:15px 40px;
    border:1px solid var(--gold-mid);color:var(--gold-dark);
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:.4em;text-transform:uppercase;
    text-decoration:none;background:transparent;border-radius:50px;
    position:relative;overflow:hidden;transition:color .5s;white-space:nowrap;
  }
  .venue-btn span.c{position:absolute;width:0;height:0;background:var(--gold-mid);border-radius:50%;transition:width .55s ease,height .55s ease,opacity .4s;opacity:0;z-index:0;pointer-events:none;}
  .venue-btn span.c1{top:0;left:0;transform:translate(-50%,-50%);}
  .venue-btn span.c2{top:0;right:0;transform:translate(50%,-50%);}
  .venue-btn span.c3{bottom:0;left:0;transform:translate(-50%,50%);}
  .venue-btn span.c4{bottom:0;right:0;transform:translate(50%,50%);}
  .venue-btn:hover span.c,.venue-btn.touched span.c{width:260px;height:260px;opacity:1;}
  .venue-btn:hover,.venue-btn.touched{color:#1a1408;}
  .venue-btn-text{position:relative;z-index:1;}

  .venue-btn::after{
    content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;
    background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.42) 50%,transparent 70%);
    animation:btnShimmer 3.4s ease-in-out infinite;pointer-events:none;z-index:2;border-radius:inherit;
  }
  @keyframes btnShimmer{0%{left:-120%}55%{left:120%}100%{left:120%}}

  @keyframes btnPulse{
    0%,100%{box-shadow:0 0 0 0 rgba(197,146,42,0);}
    50%{box-shadow:0 0 0 8px rgba(197,146,42,0.17);}
  }
  @keyframes btnReveal{
    from{opacity:0;transform:translateY(24px) scale(.95);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .venue-btn{
    opacity:0;
    animation:btnReveal .85s cubic-bezier(.22,1,.36,1) forwards paused,btnPulse 2.8s ease-in-out infinite paused;
  }
  .venue-btn.btn-visible{
    animation:btnReveal .85s cubic-bezier(.22,1,.36,1) forwards,btnPulse 2.8s ease-in-out 0.85s infinite;
  }

  /* RSVP */
  .rsvp{
    background:linear-gradient(160deg,#f0ebe0 0%,#f5f3ef 45%,#ede8da 100%);
    padding:80px 40px 100px;text-align:center;position:relative;
  }
  .rsvp::before{content:'';position:absolute;inset:20px;border:1px solid rgba(197,146,42,.22);pointer-events:none;}
  .rsvp-corner{position:absolute;width:30px;height:30px;pointer-events:none;border-color:rgba(197,146,42,0.4);border-style:solid;}
  .rsvp-corner.tl{top:30px;left:30px;border-width:1px 0 0 1px;}
  .rsvp-corner.tr{top:30px;right:30px;border-width:1px 1px 0 0;}
  .rsvp-corner.bl{bottom:30px;left:30px;border-width:0 0 1px 1px;}
  .rsvp-corner.br{bottom:30px;right:30px;border-width:0 1px 1px 0;}
  .rsvp-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.55em;text-transform:uppercase;color:var(--gold-mid);margin-bottom:18px;opacity:.85;}
  .rsvp-sub{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold-dark);opacity:.65;margin-bottom:48px;font-style:italic;letter-spacing:.03em;}
  .rsvp-form{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:22px;}
  .rsvp-field{display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
  .rsvp-field label{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;font-weight:400;letter-spacing:.06em;color:var(--gold-dark);opacity:.8;}
  .rsvp-field input,.rsvp-field select,.rsvp-field textarea{
    width:100%;background:rgba(255,255,255,0.72);border:1px solid rgba(197,146,42,0.35);
    border-radius:6px;padding:13px 16px;font-family:'Cormorant Garamond',serif;
    font-size:17px;font-style:italic;color:var(--gold-dark);outline:none;
    transition:border-color .3s,background .3s,box-shadow .3s;-webkit-appearance:none;appearance:none;
  }
  .rsvp-field input::placeholder,.rsvp-field textarea::placeholder{color:rgba(139,105,20,0.35);}
  .rsvp-field input:focus,.rsvp-field select:focus,.rsvp-field textarea:focus{
    border-color:rgba(197,146,42,0.65);background:rgba(255,255,255,0.9);box-shadow:0 0 0 3px rgba(197,146,42,0.08);
  }
  .rsvp-field select{cursor:pointer;}
  .rsvp-field select option{background:#f5f3ef;color:var(--gold-dark);}
  .rsvp-divider{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(197,146,42,0.25),transparent);margin:6px 0;}
  .rsvp-btn{
    display:inline-block;padding:16px 52px;border:1px solid var(--gold-mid);color:var(--gold-dark);
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:.4em;text-transform:uppercase;
    text-decoration:none;cursor:pointer;background:transparent;border-radius:50px;
    position:relative;overflow:hidden;transition:color .4s;margin-top:10px;align-self:center;
  }
  .rsvp-btn::before{content:'';position:absolute;inset:0;background:var(--gold-mid);transform:scaleX(0);transform-origin:left;transition:transform .4s ease;z-index:-1;}
  .rsvp-btn:hover{color:#fff;}.rsvp-btn:hover::before{transform:scaleX(1);}
  .rsvp-success{display:none;text-align:center;padding:40px 20px;}
  .rsvp-success-icon{font-size:48px;margin-bottom:16px;}
  .rsvp-success h3{font-family:'Cormorant Garamond',serif;font-size:32px;font-style:italic;color:var(--gold-dark);margin-bottom:10px;}
  .rsvp-success p{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--gold-mid);opacity:.75;}

  /* MEMORIES GALLERY */
  .mem-gallery{background:var(--off-white);padding:60px 0 50px;position:relative;}
  .mem-gallery-head,.mem-gallery-foot{display:flex;justify-content:center;padding:0 40px 36px;}
  .mem-gallery-foot{padding:36px 40px 0;}
  .mem-line-wrap{display:flex;align-items:center;gap:12px;width:min(280px,70vw);}
  .mem-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold-mid));}
  .mem-line-wrap .mem-line:last-child{background:linear-gradient(to left,transparent,var(--gold-mid));}
  .mem-diamond{width:6px;height:6px;background:var(--gold-mid);transform:rotate(45deg);flex-shrink:0;}
  .mem-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;max-width:680px;margin:0 auto;align-items:start;}
  .mem-col{display:flex;flex-direction:column;gap:10px;}
  .mem-col-right{margin-top:48px;}
  .mem-item{position:relative;overflow:hidden;border-radius:4px;box-shadow:0 6px 24px rgba(0,0,0,0.13),0 1px 4px rgba(0,0,0,0.07);}
  .mem-item::after{content:'';position:absolute;inset:0;border:1px solid rgba(197,146,42,0.18);border-radius:4px;pointer-events:none;z-index:2;}
  .mem-item img{display:block;width:100%;height:auto;transition:transform .7s cubic-bezier(.25,.46,.45,.94);}
  .mem-item:hover img{transform:scale(1.04);}
  @media(max-width:480px){.mem-grid{gap:7px;padding:0 10px;}.mem-col-right{margin-top:36px;}}

  footer{background:#1a1408;padding:40px;text-align:center;}
  .footer-names{width:min(260px,70vw);margin-bottom:14px;filter:invert(1) sepia(1) saturate(1.5) hue-rotate(5deg) brightness(1.1);}
  .footer-text{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold-mid);opacity:.5;}

  /* MUSIC PLAYER */
  .music-pill{
    position:fixed;right:16px;bottom:24px;z-index:999;
    background:rgba(245,243,239,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(197,146,42,0.4);border-radius:60px;padding:10px 18px 10px 10px;
    display:flex;align-items:center;gap:12px;
    box-shadow:0 6px 28px rgba(139,105,20,0.18),0 0 0 1px rgba(197,146,42,0.1);max-width:220px;
  }
  .music-play-btn{
    width:40px;height:40px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--gold-mid),var(--gold-dark));
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 10px rgba(197,146,42,0.35);transition:transform .2s,box-shadow .2s;
  }
  .music-play-btn:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(197,146,42,0.5);}
  .music-play-btn:active{transform:scale(.94);}
  .music-play-btn svg{fill:rgba(245,243,239,0.95);width:15px;height:15px;}
  .music-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .music-title{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--gold-dark);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .music-artist{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-mid);opacity:.9;white-space:nowrap;}

  @keyframes drip{0%{top:-100%;opacity:0}30%{opacity:1}100%{top:100%;opacity:0}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  @media(max-width:500px){.cd-unit{min-width:54px}.countdown{gap:2px}.music-pill{right:10px;bottom:16px;}}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <img class="bg" src="https://i.postimg.cc/k5tZvGvr/IMG-3082.jpg" alt="Background Image">
  <div class="hero-vignette"></div><div class="hero-fade"></div>
  <img class="hero-names" src="https://i.postimg.cc/C5J6xqS1/Picsart-26-04-18-01-03-58-103.png" alt="Lernik & Liana">
  <a class="scroll-arrow" href="#img2">
    <div class="arrow-track"></div>
    <div class="arrow-chevron">
      <div class="chevron"></div>
      <div class="chevron chevron-2"></div>
    </div>
  </a>
</section>

<div class="img2-section reveal-scale" id="img2">
  <img src="https://i.postimg.cc/fyWBpRm3/photo-output.png" alt="Image 2">
</div>

<div class="countdown-wrap">
  <p class="countdown-label reveal d1">Մինչև Հարսանիք</p>
  <div class="countdown">
    <div class="cd-unit reveal d1"><span class="cd-num" id="cd-days">00</span><span class="cd-sub">Օր</span></div>
    <span class="cd-sep reveal d2">·</span>
    <div class="cd-unit reveal d2"><span class="cd-num" id="cd-hours">00</span><span class="cd-sub">Ժամ</span></div>
    <span class="cd-sep reveal d3">·</span>
    <div class="cd-unit reveal d3"><span class="cd-num" id="cd-mins">00</span><span class="cd-sub">Րոպե</span></div>
    <span class="cd-sep reveal d4">·</span>
    <div class="cd-unit reveal d4"><span class="cd-num" id="cd-secs">00</span><span class="cd-sub">Վայրկյան</span></div>
  </div>
</div>

<div class="calendar-section">
  <img class="reveal-scale" src="https://i.postimg.cc/SRKfVtbc/IMG-3110.jpg" alt="Wedding Calendar">
</div>

<!-- DETAILS → Image only -->
<section class="details-img-section" id="details">
  <img class="reveal-scale" src="https://i.postimg.cc/qBy1y6R6/photo-output.png" alt="Ծրագիր">
</section>

<!-- GALLERY -->
<section class="gallery-section" id="gallery">
  <div class="gallery-head reveal">
    <div class="gdiv">
      <div class="gdiv-line"></div><div class="gdiv-dot"></div><div class="gdiv-line r"></div>
    </div>
  </div>
  <div class="gal-stagger reveal-scale">

    <svg id="iconPlay" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
    <svg id="iconPause" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
  </button>

<audio id="bgMusic" loop preload="auto">
  <source src="https://www.dropbox.com/scl/fi/c47tt9uxjv3x1skoqnbac/telegram_audio.ogg?rlkey=xspx1ha8ma18w1vmkzhyiy7zc&st=utw7cs8o&raw=1" type="audio/ogg">
</audio>

<script>
  /* ── MUSIC ── */
  const audio = document.getElementById('bgMusic');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  audio.volume = 0.4;

  let autoPlayDone = false;
  function tryAutoPlay() {
    if (!autoPlayDone) {
      autoPlayDone = true;
      audio.play().then(() => {
        iconPlay.style.display = 'none';
        iconPause.style.display = 'block';
      }).catch(() => {});
    }
  }
  document.addEventListener('click', tryAutoPlay, { once: true });
  document.addEventListener('touchstart', tryAutoPlay, { once: true });
  window.addEventListener('load', () => {
    audio.play().then(() => {
      autoPlayDone = true;
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
    }).catch(() => {});
  });

  window.togglePlay = function() {
    if (audio.paused) {
      audio.play().catch(() => {});
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
    } else {
      audio.pause();
      iconPlay.style.display = 'block';
      iconPause.style.display = 'none';
    }
  };

  /* ── COUNTDOWN ── */
  function updateCountdown() {
    const targetDate = new Date(2026, 5, 30);
    const now = new Date();
    const diff = targetDate - now;
    if (diff <= 0) {
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).innerText = '00');
      return;
    }
    document.getElementById('cd-days').innerText  = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('cd-hours').innerText = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cd-mins').innerText  = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-secs').innerText  = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  }
  setInterval(updateCountdown, 1000);
  updateCountdown();

  /* ── SCROLL REVEAL ── */
  const reveals = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale');
  function checkReveal() {
    for (let el of reveals) {
      if (el.getBoundingClientRect().top < window.innerHeight - 150) el.classList.add('visible');
    }
  }
  window.addEventListener('scroll', checkReveal);
  checkReveal();

  /* ── VENUE BUTTON REVEAL ── */
  const btnObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('btn-visible'); btnObserver.unobserve(e.target); }
    });
  }, { threshold: 0.4 });
  document.querySelectorAll('.venue-btn').forEach(btn => btnObserver.observe(btn));

  document.querySelectorAll('.venue-btn').forEach(btn => {
    btn.addEventListener('touchstart', () => btn.classList.add('touched'), { passive: true });
    btn.addEventListener('touchend', () => setTimeout(() => btn.classList.remove('touched'), 500), { passive: true });
  });

  /* ── GIFT FIELD TOGGLE ── */
  document.getElementById('f-attend').addEventListener('change', function() {
    const giftField = document.getElementById('giftField');
    if (this.value === 'Այո, կմասնակցեմ') {
      giftField.style.display = 'flex';
    } else {
      giftField.style.display = 'none';
      document.getElementById('f-gift').value = '';
    }
  });

  /* ── RSVP SUBMIT ── */
  window.submitRSVP = function() {
    const name    = document.getElementById('f-name').value.trim();
    const side    = document.getElementById('f-side').value;
    const guests  = document.getElementById('f-guests').value;
    const attend  = document.getElementById('f-attend').value;
    const gift    = document.getElementById('f-gift').value;
    const attending = attend === 'Այո, կմասնակցեմ';

    if (!name || !side || !guests || !attend || (attending && !gift)) {
      if (!name)              document.getElementById('f-name').style.borderColor   = 'rgba(197,146,42,0.8)';
      if (!side)              document.getElementById('f-side').style.borderColor   = 'rgba(197,146,42,0.8)';
      if (!guests)            document.getElementById('f-guests').style.borderColor = 'rgba(197,146,42,0.8)';
      if (!attend)            document.getElementById('f-attend').style.borderColor = 'rgba(197,146,42,0.8)';
      if (attending && !gift) document.getElementById('f-gift').style.borderColor   = 'rgba(197,146,42,0.8)';
      return;
    }

    fetch('https://formsubmit.co/ajax/erooo661@gmail.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        _subject: `RSVP՝ ${name} — Լեռնիկ & Լիանա`,
        _captcha: 'false',
        _template: 'table',
        name, side, guests, attend,
        gift: gift || '—'
      })
    }).catch(() => {});

    document.getElementById('rsvpForm').style.display = 'none';
    const success = document.getElementById('rsvpSuccess');
    success.style.display = 'block';
    success.style.opacity = '0';
    setTimeout(() => { success.style.transition = 'opacity .8s'; success.style.opacity = '1'; }, 50);
  };
</script>
</body>
